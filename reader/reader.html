<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Read-Along Highlighter</title>
    <link rel="stylesheet" href="./style.css" type="text/css" />
    <!-- Vercel Web Analytics -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <body>
    <div id="model-status-bar">
      <span id="model-status">Initializing model…</span>
    </div>

    <div id="text-container">
      <p id="display-text">Waiting for model…</p>
    </div>
    <div id="highlighted-container">
      <h3>Highlighted Text:</h3>
      <p id="highlighted-text"></p>
    </div>
    <div id="meaning-container">
      <h3>Word Meaning:</h3>
      <p id="word-meaning"></p>
    </div>
    <div id="transcript-container">
      <h3>Transcript:</h3>
      <p id="transcript"></p>
    </div>
    <button id="pronounceBtn">Pronounce Selected Word</button>
    <button id="startBtn" disabled>Start Reading</button>
    <button id="newParagraphBtn" disabled>New Paragraph</button>

    <script type="module" src="script.js"></script>
  </body>
</html>
