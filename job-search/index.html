<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Search Engines</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --text: #1f2937;
        --border: #d8dee8;
        --accent: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      header {
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.8rem, 3vw, 2.6rem);
        line-height: 1.1;
      }

      .search-grid {
        display: grid;
        gap: 18px;
      }

      .search-container {
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
      }

      .search-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
      }

      h2 {
        margin: 0;
        font-size: 1rem;
        line-height: 1.3;
      }

      .engine-number {
        flex: 0 0 auto;
        color: var(--accent);
        font-size: 0.85rem;
        font-weight: 700;
      }

      iframe {
        display: block;
        width: 100%;
        height: 520px;
        border: 0;
        background: #ffffff;
      }

      @media (max-width: 640px) {
        main {
          width: min(100% - 20px, 1180px);
          padding: 20px 0;
        }

        .search-header {
          align-items: flex-start;
          flex-direction: column;
          gap: 4px;
        }

        iframe {
          height: 560px;
        }
      }
    </style>
    <!-- Vercel Web Analytics -->
    <script>
      window.va =
        window.va ||
        function () {
          (window.vaq = window.vaq || []).push(arguments);
        };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <body>
    <main>
      <header>
        <h1>Job Search Engines</h1>
      </header>

      <section
        class="search-grid"
        id="search-grid"
        aria-label="Job search engines"
      ></section>
    </main>

    <script>
      const searchEngines = [
        { title: "Search Engine 1", url: "search1.html" },
        { title: "Search Engine 2", url: "search2.html" },
        { title: "Search Engine 3", url: "search3.html" },
        { title: "Search Engine 4", url: "search4.html" },
        { title: "Search Engine 5", url: "search5.html" },
        { title: "Search Engine 6", url: "search6.html" },
        { title: "Search Engine 7", url: "search7.html" },
        { title: "Search Engine 8", url: "search8.html" },
        { title: "Search Engine 9", url: "search9.html" },
        { title: "Search Engine 10", url: "search10.html" },
        { title: "Search Engine 11", url: "search11.html" },
        { title: "Search Engine 12", url: "search12.html" },
        { title: "Search Engine 13", url: "search13.html" },
        { title: "Search Engine 14", url: "search14.html" },
        { title: "Search Engine 15", url: "search15.html" },
      ];

      const grid = document.querySelector("#search-grid");

      for (const [index, engine] of searchEngines.entries()) {
        const article = document.createElement("article");
        article.className = "search-container";

        const header = document.createElement("div");
        header.className = "search-header";

        const title = document.createElement("h2");
        title.textContent = engine.title;

        const number = document.createElement("span");
        number.className = "engine-number";
        number.textContent = `Engine ${index + 1}`;

        const iframe = document.createElement("iframe");
        iframe.src = engine.url;
        iframe.title = engine.title;
        iframe.loading = "lazy";

        header.append(title, number);
        article.append(header, iframe);
        grid.append(article);
      }
    </script>
  </body>
</html>
